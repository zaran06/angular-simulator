<header>
  <div class="header-container">
    <div class="logo">
      <img src="/images/logo-icon.svg" alt="Логотип РУМТИБЕТ" class="logo-img" />
      <span class="bold">{{ companyName }}</span>
    </div>
    <nav class="navigation">
      <a href="#" class="nav-link semi-bold fs-18">Главная</a>
      <a href="#" class="nav-link semi-bold fs-18">Про гида</a>
      <a href="#" class="nav-link semi-bold fs-18">Программа тура</a>
      <a href="#" class="nav-link semi-bold fs-18">Стоимость</a>
      <a href="#" class="nav-link semi-bold fs-18">Блог</a>
      <a href="#" class="nav-link semi-bold fs-18">Контакты</a>
    </nav>
    <button class="consult-btn semi-bold">Консультация</button>
  </div>
</header>

<section class="hero">
  <h1 class="title regular fs-50">
    Насладись прогулкой в горах <br />
    с командой единомышленников
  </h1>

  <div class="search-panel">
    <div class="search-inner">
      <div class="search-field search-field--location">
        <span class="field-label bold fs-16">
          <span>Локация для тура</span>
          <img src="/images/arrow-icon.svg" class="field-icon" alt="arrow" />
        </span>
        <span class="field-value regular fs-14">выберите из списка</span>
      </div>

      <div class="search-field search-field--date">
        <span class="field-label bold fs-16">
          <span>Дата похода</span>
          <img src="/images/calendar-icon.svg" class="field-icon" alt="calendar" />
        </span>
        <span class="field-value regular fs-14">укажите дату</span>
      </div>

      <div class="search-field search-field--participants">
        <span class="field-label bold fs-16">
          <span>Участники</span>
          <img src="/images/arrow-icon.svg" class="field-icon" alt="arrow" />
        </span>
        <span class="field-value regular fs-14">выберите из списка</span>
      </div>

      <button class="search-btn bold fs-16">Найти программу</button>
    </div>
  </div>
</section>
